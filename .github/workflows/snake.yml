name: Generate Snake

on:
  schedule:
    # Roda todo dia à meia-noite (UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gerar SVG da cobrinha
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: igorpds-fullstack
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=34d399
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=10b981

      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
